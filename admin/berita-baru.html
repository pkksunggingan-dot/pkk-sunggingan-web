<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Tambah Berita - Admin PKK Sunggingan</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

  <div class="admin-layout">
    
    <!-- Sidebar (sama kayak berita.html) -->
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img src="/assets/img/logo/logo-pkk.PNG" alt="Logo" class="admin-brand-logo">
        <div class="admin-brand-text">
          <span class="admin-brand-name">PKK Admin</span>
          <span class="admin-brand-sub">Sunggingan</span>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="/admin/index.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="/admin/berita.html" class="admin-nav-link is-active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
          Berita
        </a>
        <a href="/admin/agenda.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Agenda
        </a>
        <a href="/admin/program.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Program
        </a>
      </nav>

      <div class="admin-user-info">
        <div class="admin-user-name" id="userName">Loading...</div>
        <div class="admin-user-email" id="userEmail"></div>
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="admin-main">
      
      <div class="admin-page-header">
        <div>
          <h1>Tambah Berita Baru</h1>
          <p>Isi form di bawah untuk mempublikasikan berita baru</p>
        </div>
        <a href="/admin/berita.html" class="btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Kembali
        </a>
      </div>

      <div class="admin-form-card">

        <div id="alertMessage" style="display: none;"></div>

        <form id="beritaForm">

          <div class="admin-form-group">
            <label for="judul" class="admin-form-label">
              Judul Berita <span style="color: #C0392B;">*</span>
            </label>
            <input 
              type="text" 
              id="judul" 
              name="judul" 
              class="admin-form-input" 
              placeholder="Contoh: Pelatihan Buket Kreatif Pokja II"
              required
              maxlength="200">
          </div>

          <div class="admin-form-group">
            <label for="tanggal" class="admin-form-label">
              Tanggal Berita <span style="color: #C0392B;">*</span>
            </label>
            <input 
              type="date" 
              id="tanggal" 
              name="tanggal" 
              class="admin-form-input" 
              required>
          </div>

          <div class="admin-form-group">
            <label for="tag" class="admin-form-label">
              Kategori (Pokja)
            </label>
            <select id="tag" name="tag" class="admin-form-select">
              <option value="Sekretariat">Sekretariat</option>
              <option value="Pokja I">Pokja I - Penghayatan Pancasila & Gotong Royong</option>
              <option value="Pokja II">Pokja II - Pendidikan & Koperasi</option>
              <option value="Pokja III">Pokja III - Pangan, Sandang, Perumahan</option>
              <option value="Pokja IV">Pokja IV - Kesehatan & Lingkungan</option>
            </select>
          </div>

          <div class="admin-form-group">
            <label for="excerpt" class="admin-form-label">
              Ringkasan <span class="admin-form-label-hint">(2-3 kalimat, muncul di homepage)</span>
            </label>
            <textarea 
              id="excerpt" 
              name="excerpt" 
              class="admin-form-textarea" 
              placeholder="Ringkasan pendek berita, muncul sebagai preview di homepage..."
              maxlength="300"></textarea>
          </div>

          <div class="admin-form-group">
            <label for="isi" class="admin-form-label">
              Isi Lengkap <span class="admin-form-label-hint">(paragraf lengkap berita)</span>
            </label>
            <textarea 
              id="isi" 
              name="isi" 
              class="admin-form-textarea admin-form-textarea-large" 
              placeholder="Isi lengkap berita. Bisa banyak paragraf..."></textarea>
          </div>

          <div class="admin-form-group">
            <label for="status" class="admin-form-label">
              Status
            </label>
            <select id="status" name="status" class="admin-form-select">
              <option value="draft">Draft (belum dipublikasikan)</option>
              <option value="published">Publish (langsung terbit)</option>
            </select>
          </div>

          <div class="admin-form-actions">
            <button type="submit" class="btn-primary" id="submitBtn">
              <span class="btn-text">Simpan Berita</span>
              <span class="btn-loader" style="display: none;">Menyimpan...</span>
            </button>
            <a href="/admin/berita.html" class="btn-secondary">Batal</a>
          </div>

        </form>

      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/berita.js"></script>

  <script>
    (async function() {
      const isAuth = await Auth.requireAuth();
      if (!isAuth) return;

      const admin = await Auth.getAdminInfo();
      if (admin) {
        document.getElementById('userName').textContent = admin.nama;
        document.getElementById('userEmail').textContent = admin.email;
      }

      // Set default tanggal hari ini
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('tanggal').value = today;
    })();

    document.getElementById('beritaForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      const btnText = btn.querySelector('.btn-text');
      const btnLoader = btn.querySelector('.btn-loader');
      const alertBox = document.getElementById('alertMessage');

      // Show loading
      btn.disabled = true;
      btnText.style.display = 'none';
      btnLoader.style.display = 'inline';
      alertBox.style.display = 'none';

      const formData = {
        judul: document.getElementById('judul').value.trim(),
        tanggal: document.getElementById('tanggal').value,
        tag: document.getElementById('tag').value,
        excerpt: document.getElementById('excerpt').value.trim(),
        isi: document.getElementById('isi').value.trim(),
        status: document.getElementById('status').value
      };

      const result = await Berita.create(formData);

      if (result.success) {
        // Success alert
        alertBox.className = 'form-alert form-alert-success';
        alertBox.textContent = '✓ Berita berhasil disimpan! Mengalihkan ke daftar berita...';
        alertBox.style.display = 'block';

        // Redirect ke list setelah 1.5 detik
        setTimeout(() => {
          window.location.href = '/admin/berita.html';
        }, 1500);
      } else {
        // Error alert
        alertBox.className = 'form-alert form-alert-error';
        alertBox.textContent = '✗ Gagal simpan berita: ' + result.error;
        alertBox.style.display = 'block';
        
        btn.disabled = false;
        btnText.style.display = 'inline';
        btnLoader.style.display = 'none';
      }
    });

    async function handleLogout() {
      if (confirm('Yakin mau logout?')) await Auth.logout();
    }
  </script>

</body>
</html>
