<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Login Admin - TP PKK Kelurahan Sunggingan</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card">
      
      <div class="login-header">
        <img src="/assets/img/logo/logo-pkk.PNG" alt="Logo TP PKK" class="login-logo">
        <h1 class="login-title">Admin Panel</h1>
        <p class="login-subtitle">TP PKK Kelurahan Sunggingan</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="pkksunggingan@gmail.com"
            required
            autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Masukkan password"
            required
            autocomplete="current-password">
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">Login</span>
          <span class="btn-loader" style="display: none;">Memuat...</span>
        </button>
      </form>

      <div class="login-footer">
        <a href="/" class="back-link">← Kembali ke Beranda</a>
      </div>

    </div>
  </div>

  <!-- Supabase SDK from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Our scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/auth.js"></script>
  
  <script>
    // Check kalau udah login, langsung redirect ke dashboard
    (async function() {
      const session = await Auth.getSession();
      if (session) {
        window.location.href = '/admin/index.html';
      }
    })();

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMessage');
      const btn = document.getElementById('loginBtn');
      const btnText = btn.querySelector('.btn-text');
      const btnLoader = btn.querySelector('.btn-loader');

      // Show loading state
      errorMsg.style.display = 'none';
      btn.disabled = true;
      btnText.style.display = 'none';
      btnLoader.style.display = 'inline';

      const result = await Auth.login(email, password);

      if (result.success) {
        // Redirect ke dashboard
        window.location.href = '/admin/index.html';
      } else {
        // Show error
        errorMsg.textContent = result.error;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btnText.style.display = 'inline';
        btnLoader.style.display = 'none';
      }
    });
  </script>

</body>
</html>
