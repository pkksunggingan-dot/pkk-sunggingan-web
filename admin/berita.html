<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Kelola Berita - Admin PKK Sunggingan</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

  <div class="admin-layout">
    
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img src="/assets/img/logo/logo-pkk.PNG" alt="Logo" class="admin-brand-logo">
        <div class="admin-brand-text">
          <span class="admin-brand-name">PKK Admin</span>
          <span class="admin-brand-sub">Sunggingan</span>
        </div>
      </div>

      <nav class="admin-nav">
        <a href="/admin/index.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="/admin/berita.html" class="admin-nav-link is-active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
          Berita
        </a>
        <a href="/admin/agenda.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Agenda
        </a>
        <a href="/admin/program.html" class="admin-nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          Program
        </a>
      </nav>

      <div class="admin-user-info">
        <div class="admin-user-name" id="userName">Loading...</div>
        <div class="admin-user-email" id="userEmail"></div>
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="admin-main">
      
      <div class="admin-page-header">
        <div>
          <h1>Kelola Berita</h1>
          <p>Tambah, edit, atau hapus berita yang muncul di homepage</p>
        </div>
        <a href="/admin/berita-baru.html" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Tambah Berita
        </a>
      </div>

      <div id="loadingState" class="loading-state">Memuat berita...</div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <p><strong>Belum ada berita.</strong></p>
        <p>Klik "Tambah Berita" untuk membuat berita pertama.</p>
      </div>

      <div id="beritaTable" class="admin-table-wrap" style="display: none;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Judul</th>
              <th>Tanggal</th>
              <th>Tag</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="beritaTableBody">
            <!-- populated by JS -->
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/berita.js"></script>

  <script>
    (async function() {
      const isAuth = await Auth.requireAuth();
      if (!isAuth) return;

      const admin = await Auth.getAdminInfo();
      if (admin) {
        document.getElementById('userName').textContent = admin.nama;
        document.getElementById('userEmail').textContent = admin.email;
      }

      loadBerita();
    })();

    async function loadBerita() {
      const beritaList = await Berita.getAll();
      
      document.getElementById('loadingState').style.display = 'none';

      if (beritaList.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      renderTable(beritaList);
      document.getElementById('beritaTable').style.display = 'block';
    }

    function renderTable(beritaList) {
      const tbody = document.getElementById('beritaTableBody');
      tbody.innerHTML = beritaList.map(berita => `
        <tr>
          <td>
            <div class="table-title">${escapeHtml(berita.judul)}</div>
            <div class="table-subtitle">${Berita.truncate(berita.excerpt, 80)}</div>
          </td>
          <td>${Berita.formatDate(berita.tanggal)}</td>
          <td><span class="tag-badge">${escapeHtml(berita.tag || 'Sekretariat')}</span></td>
          <td>
            <span class="status-badge status-${berita.status}">
              ${berita.status === 'published' ? 'Terbit' : 'Draft'}
            </span>
          </td>
          <td>
            <a href="/admin/berita-edit.html?id=${berita.id}" class="btn-icon" title="Edit">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </a>
            <button onclick="handleDelete('${berita.id}', '${escapeHtml(berita.judul).replace(/'/g, "\\'")}')" class="btn-icon btn-icon-danger" title="Hapus">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </td>
        </tr>
      `).join('');
    }

    async function handleDelete(id, judul) {
      if (!confirm(`Yakin hapus berita "${judul}"?\n\nAksi ini tidak dapat dibatalkan.`)) return;

      const result = await Berita.delete(id);
      if (result.success) {
        alert('Berita berhasil dihapus.');
        loadBerita();
      } else {
        alert('Gagal hapus berita: ' + result.error);
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function handleLogout() {
      if (confirm('Yakin mau logout?')) await Auth.logout();
    }
  </script>

</body>
</html>
